ShortDescription: A fast, keyboard-driven window switcher for Windows with fuzzy search.
Description: |-
  Windows Task Switcher is a lightweight productivity tool that replaces the default Alt+Tab
  experience with a fast, searchable window list. Press Ctrl+Space, type a few characters of
  any window title or process name, and switch instantly. Features fuzzy matching with smart
  ranking, learned preferences, optional Alt+Tab override, and automatic dark/light theme detection.
